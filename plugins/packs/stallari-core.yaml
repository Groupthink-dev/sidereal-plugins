    services_used:
      - service: vault
        operations: [ read, search, files, lens_fts, lens_remember, create, append, property_set ]
    trigger:
      on_demand: true
    graph: plan-execute
    inputs:
      - description: "Vault path to the corpus to distil (recursive). Examples: atlas/source/articles, +/notes/legacy-import, spaces/Personal/Areas/Reading. For non-vault corpora (~/Documents/Articles/, Evernote exports, downloaded paper collections), drop the files into +/ingest/ first and let process-inbox file them, then run distil with target_path pointing at wherever they landed. "
        key: target_path
        label: Corpus folder
        required: true
        type: string
      - default:
          - person
          - organisation
        description: "Default `[person, organisation]` (highest signal classes). Add `place`, `topic`, or `effort` opt-in per corpus — `topic` stays opt-in always (every article has 5; topic cards become ontology, not entities). The dropped-by-type counts in the batch report tell you what the corpus actually contains. "
        key: entity_types
        label: Entity types to extract
        required: false
        type: enum_array
        values:
          - person
          - organisation
          - place
          - topic
          - effort
      - default: 0.7
        description: "Candidates below this are dropped silently. 0.7 is a conservative default; lower if too few candidates surface; higher if too many low-signal items reach the handoff. "
        key: confidence_threshold
        label: Confidence threshold
        max: 0.95
        min: 0.5
        required: false
        type: float
      - default: 20
        description: "Cap on candidates per handoff note — prevents review fatigue on large corpora. A 200-candidate corpus chunks into ~10 batches of 20. "
        key: max_proposals_per_batch
        label: Candidates per batch
        max: 50
        min: 5
        required: false
        type: int
      - default: atlas/
        description: "Where to look for already-existing cards before proposing a new one. Defaults to atlas/ (covers atlas/people/, atlas/people/public/, atlas/orgs/). Family-card paths under spaces/People/family/ are always checked regardless and default to `merge` (never auto-create new family cards). "
        key: existing_card_search_root
        label: Existing-card search root
        required: false
        type: string
    briefing:
