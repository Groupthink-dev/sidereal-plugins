      summary: >-
        Community and verified agents now operate under platform guardrails covering vault integrity, data leakage, identity, credential scope, and prompt injection defence.
    - id: herald-consent-model
      title: Agent Consent Model
      since_harness: "0.66.0.0"
      summary: >-
        Community pack agents require explicit consent before first dispatch. Manage consents in Settings > Privacy > Agent Access.

workflows:
  - name: morning-automation
    description: Full morning automation pass
    schedule: "0 7 * * *"
    steps:
      - skill: email-triage
        condition: always
      - skill: process-inbox
        after: [ email-triage ]
      - skill: daily-digest
        after: [ email-triage, process-inbox ]

# ── Pack-level config ──────────────────────────────────────────────
# Tunables for the wiki-maintain trio (DD-194, added v3.6.0).

config:
  user_inputs:
    - key: stale_card_days
      type: int
      label: Stale-card threshold (days)
      description: >
        wiki-maintain-lint flags entity cards as stale when last_interaction (or last inbound back-reference) is older than this many days.
      default: 90
      min: 7
      max: 730
      required: false

    - key: dormant_effort_days
      type: int
      label: Dormant-effort threshold (days)
      description: >
        wiki-maintain-lint flags efforts with status=on as dormant when their body has not been modified within this many days. Recommends a targeted wiki-maintain-query dispatch (does not auto-fire).
      default: 30
      min: 7
      max: 365
      required: false
