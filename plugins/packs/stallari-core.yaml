        operations: [ read, search, create, append ]
      - service: tasks
        operations: [ create ]
    trigger:
      on_demand: true
      watch: [ "+/ingest", "+/triage" ]
    graph: gate
    graph_config:
      classify_tier: fast
      routes:
        email_handoff: react_email
        web_clip: react_webclip
        pdf_import: react_pdf
        text_note: react_text
        operator_handoff: react_handoff
    required_services:
      - vault.read
      - vault.search
      - vault.create
      - vault.append
      - tasks.create
    allow_request_service: true
    allow_request_tool: false
