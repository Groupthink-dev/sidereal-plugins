  - name: home-state-summary
    agent: home-operator
    description: Narrate current Home Assistant device state, anomalies, and recent automation fires
    tier: standard
    category: report
    services_used:
      - service: home
        operations: [ read ]
      - service: vault
        operations: [ read, create ]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Produce a narrative summary of the home's current state via Home Assistant.

      Steps:
      1. Query Home Assistant for current entity states (lights, climate,
         sensors, locks, presence detectors).
      2. Identify anomalies: lights on in unoccupied rooms, climate set
         outside target band, doors/windows reporting open, batteries low.
      3. List recent automation fires (last 12h) with outcome.
      4. Write a narrative to spaces/Family Living/Areas/<area>/home-state-{date}.md
         with sections: At a glance, Anomalies, Recent automations, Suggested
         attention.
      5. Read-only — never invoke services to change physical state. If you
         identify a desirable change (e.g. arm an alarm), surface it as a
         suggestion in the note for human action.
    required_services:
      - home.read
      - vault.read
      - vault.create
    allow_request_service: true
    allow_request_tool: false

  - name: expense-triage
    agent: bizops-operator
    description: Classify expense receipts and bill notifications by category and cost centre
    tier: fast
    category: triage
    services_used:
      - service: vault
        operations: [ read, search, append ]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Triage expense receipts and bill notifications captured in the inbox.

      Steps:
      1. Search +/ingest/ and +/triage/ for items with money-related domains:
         personal-services, trustee-corporate, funds-investment, family,
         home, school-education, or any property-* domain.
      2. For each item, extract amount, currency, vendor, date, and any
         visible cost centre signal (entity name, payment account).
      3. Classify cost centre by domain: family expenses → Family Living;
         entity-billed → Family Office; school fees → school-education.
      4. Append a structured triage line to spaces/Family Office/Areas/
         Funds Management/expense-triage-{YYYY-WW}.md:
         | date | vendor | amount | classified-domain | confidence | source-note |
      5. Always cite the source note. Decline classification rather than
         guess when the entity-billed signal is ambiguous; flag the item
         with low confidence and continue.
    required_services:
      - vault.read
      - vault.search
      - vault.append
    allow_request_service: true
    allow_request_tool: false

  - name: pr-review-summary
    agent: review-operator
    description: Review a pull request diff with risk callouts and missing-coverage flags
    tier: reasoning
    category: review
    services_used:
      - service: vault
        operations: [ read, create ]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Review a pull request diff. The PR target (repo + number, or local diff
      file path) is supplied in the dispatch arguments.

      Steps:
      1. Fetch the diff and PR metadata (title, description, branch, files
         changed, commit messages).
      2. For each file in the diff, identify concrete issues with
         file:line citations. Prioritise:
           - Logic errors and untested edge cases
           - Security implications (input validation, auth, secrets)
           - API/contract drift not reflected in tests or docs
           - Naming and intent mismatch (function does what its name does not say)
         Skip stylistic nitpicks unless they have functional impact.
      3. Identify what is NOT in the diff that should be: missing tests for
         new behaviour, missing docs for new public API, missing changelog
         entry for behavioural changes.
      4. Write the review to atlas/utilities/agent-ledgers/detail/PR-<repo>-<n>.md:
         a one-paragraph summary, then a Findings section with file:line
         entries, then a Missing-coverage section, then an Affirmative section
         stating what was checked and is correct.
      5. If you find nothing wrong, say so explicitly with the list of what
         you checked. "Looks good" is not a review.
    required_services:
      - vault.read
      - vault.create
    allow_request_service: true
    allow_request_tool: false

