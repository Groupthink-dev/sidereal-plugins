    graph: plan-execute
    inputs:
      - description: "Vault path to the corpus to lint (recursive). Examples: atlas/source/article, atlas/source/paper, +/notes/legacy-import. Pre-flight rejects absolute paths, `..` traversal, and human-only roots (`+/ingest/`, `+/notes/`, `spaces/People/family/`, `spaces/People/friends/`). "
        key: target_path
        label: Corpus folder
        required: true
        type: string
      - description: "Drives the `kind: source/<subtype>` value the lint pass enforces. Inferred from the last path segment of `target_path` (with trailing `s` stripped) when absent. "
